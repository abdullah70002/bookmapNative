name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project
        run: unzip bookmapNative.zip

      - name: Build APK
        run: |
          # الدخول لمجلد المشروع
          cd bookmapNative
          
          # بما أن ملف gradlew مفقود، سنقوم بتوليده باستخدام gradle المثبت في النظام
          gradle wrapper
          
          # إعطاء صلاحية التنفيذ وبدء البناء
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
