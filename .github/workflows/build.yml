name: Android Build Final

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project
        run: unzip bookmapNative.zip

      - name: Build APK
        run: |
          cd bookmapNative
          
          # استخدام Gradle 8.0 كحل وسط ممتاز لـ SDK 34 و Java 17
          gradle wrapper --gradle-version 8.0
          
          chmod +x gradlew
          
          # البناء مع تفعيل الدعم الكامل للمكتبات المذكورة في ملفك
          ./gradlew assembleDebug --stacktrace --no-daemon \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Crypto-Bookmap-App
          path: "**/build/outputs/apk/debug/*.apk"
