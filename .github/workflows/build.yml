name: Android Build Termux Style

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # مطابقة إصدار Java 21 الموجود في جهازك
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Extract Project
        run: unzip bookmapNative.zip

      - name: Build APK
        run: |
          cd bookmapNative
          
          # مطابقة إصدار Gradle 8.4 الموجود في جهازك
          gradle wrapper --gradle-version 8.4
          
          chmod +x gradlew
          
          # تشغيل البناء مع تفعيل المكتبات الحديثة
          ./gradlew assembleDebug --stacktrace --no-daemon \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Termux-Style-APK
          path: "**/build/outputs/apk/debug/*.apk"
