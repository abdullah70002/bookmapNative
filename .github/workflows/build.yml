name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # استخدام Java 11 لأنه الإصدار المتوافق مع AGP 7.4.2
      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Extract Project
        run: unzip bookmapNative.zip

      - name: Build APK
        run: |
          cd bookmapNative
          
          # تثبيت Gradle 7.5 حصراً ليتوافق مع Java 11 ومع AGP 7.4.2
          gradle wrapper --gradle-version 7.5
          
          chmod +x gradlew
          
          # البدء بالبناء مع تفعيل أدوات التوافق
          ./gradlew clean assembleDebug --stacktrace --no-daemon \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Trading-App-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
