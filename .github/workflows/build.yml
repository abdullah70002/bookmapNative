name: Android Build Final Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project
        run: unzip bookmapNative.zip

      - name: Build APK
        run: |
          cd bookmapNative
          
          # تثبيت نسخة Gradle 8.1.1 المتوافقة مع Java 17 و SDK 34
          gradle wrapper --gradle-version 8.1.1
          
          chmod +x gradlew
          
          # تنظيف الملفات المؤقتة وبدء البناء مع تفعيل أدوات التوافق
          ./gradlew clean assembleDebug --stacktrace --no-daemon \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bookmap-App-APK
          path: "**/build/outputs/apk/debug/*.apk"
