name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project
        run: |
          unzip bookmapNative.zip
          echo "Listing all files to find gradlew:"
          find . -maxdepth 4 -not -path '*/.*'

      - name: Build APK
        run: |
          # البحث عن ملف gradlew في كل المجلدات
          GRADLEW_PATH=$(find . -name gradlew -print -quit)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew STILL not found!"
            ls -R
            exit 1
          fi
          
          echo "Found gradlew at: $GRADLEW_PATH"
          cd $(dirname "$GRADLEW_PATH")
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
