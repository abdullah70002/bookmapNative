name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project
        run: unzip bookmapNative.zip

      - name: Build APK
        run: |
          cd bookmapNative
          
          # تثبيت نسخة Gradle 8.2 لضمان التوافق مع المشروع
          gradle wrapper --gradle-version 8.2
          
          chmod +x gradlew
          
          # تشغيل البناء مع إضافة flag لتجاهل التحذيرات البسيطة
          ./gradlew assembleDebug --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
